<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🎂 Happy 18th Birthday Baby ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        body {
            background: #1a0b1f;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }
        #app {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .scene {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.9s cubic-bezier(0.23, 1, 0.32, 1);
            padding: 1.5rem;
            overflow-y: auto;
        }
        .scene.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* ----- OPENING ----- */
        #opening {
            background: linear-gradient(145deg, #ffb3c6, #ff8fab, #fb6f92);
            position: relative;
        }
        .floating-hearts {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .heart-float {
            position: absolute;
            font-size: 2rem;
            animation: floatUp linear infinite;
            opacity: 0.5;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0.4);
                opacity: 0.7;
            }
            100% {
                transform: translateY(-10vh) rotate(720deg) scale(1.2);
                opacity: 0;
            }
        }
        .sparkle {
            position: absolute;
            border-radius: 50%;
            background: white;
            box-shadow: 0 0 20px #fff9;
            animation: sparklePulse 1.8s infinite alternate;
        }
        @keyframes sparklePulse {
            0% {
                opacity: 0.2;
                transform: scale(0.5);
            }
            100% {
                opacity: 1;
                transform: scale(1.5);
            }
        }

        .title-large {
            font-size: clamp(2.6rem, 10vw, 4.8rem);
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 40px #ffb3c6, 0 0 80px #ff4d6d, 0 0 120px #c9184a;
            text-align: center;
            z-index: 2;
            animation: glowPulse 2s infinite alternate;
            letter-spacing: 2px;
            line-height: 1.2;
            margin-bottom: 0.5rem;
        }
        @keyframes glowPulse {
            0% {
                text-shadow: 0 0 20px #ffb3c6, 0 0 40px #ff4d6d;
            }
            100% {
                text-shadow: 0 0 60px #ffb3c6, 0 0 120px #ff4d6d, 0 0 180px #c9184a;
            }
        }
        .sub-glow {
            font-size: clamp(1.2rem, 4vw, 2.2rem);
            color: #ffe5d9;
            text-shadow: 0 0 30px #ff4d6d;
            margin-bottom: 2rem;
            z-index: 2;
            text-align: center;
        }

        .btn-begin {
            padding: 1.2rem 3.5rem;
            border: none;
            background: linear-gradient(135deg, #ff4d6d, #c9184a);
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 0 40px #ff4d6d88, 0 10px 30px #00000033;
            transition: all 0.2s;
            letter-spacing: 2px;
            z-index: 2;
        }
        .btn-begin:hover {
            transform: scale(1.05);
            box-shadow: 0 0 70px #ff4d6d, 0 10px 40px #00000055;
        }

        /* ----- NU SCENE (first interaction) ----- */
        #nu-scene {
            background: linear-gradient(135deg, #2b0f1c, #4a1a2e);
        }
        .nu-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            text-align: center;
        }
        .nu-title {
            font-size: clamp(2rem, 6vw, 3.5rem);
            color: #fff;
            text-shadow: 0 0 30px #ffb3c6;
            max-width: 600px;
        }
        .nu-btn {
            padding: 1.2rem 2.8rem;
            border: none;
            background: #ff4d6d;
            color: white;
            font-size: 2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px #ff4d6d;
            transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 5;
            touch-action: none;
        }
        .nu-btn.yes {
            background: #2ecc71;
            box-shadow: 0 0 40px #2ecc71;
            font-size: 2.2rem;
            padding: 1.2rem 3.5rem;
        }
        .nu-btn:active {
            transform: scale(0.95);
        }

        /* ----- MESSAGE SCENE (second page) ----- */
        #message-scene {
            background: linear-gradient(145deg, #1a0b1f, #2d1b30);
            padding: 2rem 1.5rem;
            justify-content: flex-start;
            overflow-y: auto;
        }
        .message-card {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 2.5rem 2rem;
            border: 1px solid rgba(255, 179, 198, 0.2);
            box-shadow: 0 30px 60px #00000055;
            margin: 1rem 0;
            max-height: 70vh;
            overflow-y: auto;
        }
        .message-text {
            color: #f5e6e6;
            font-size: clamp(0.95rem, 2vw, 1.2rem);
            line-height: 2;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message-text h1,
        .message-text h2 {
            color: #ffb3c6;
            margin: 0.5rem 0;
        }
        .message-text p {
            margin: 0.8rem 0;
        }
        .message-text .heart-emoji {
            display: inline-block;
            animation: heartBeat 1.2s infinite;
        }
        @keyframes heartBeat {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.3);
            }
        }

        /* celebration overlay */
        .celebration-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            overflow: hidden;
        }
        .confetti-piece {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #ff4d6d;
            animation: confettiFall linear forwards;
            opacity: 0.9;
        }
        @keyframes confettiFall {
            0% {
                transform: translateY(-10vh) rotate(0deg) scale(0.6);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(720deg) scale(1.2);
                opacity: 0;
            }
        }
        .firework-particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: fireworkBurst 1.2s ease-out forwards;
        }
        @keyframes fireworkBurst {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(0.3);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(1.3);
            }
        }

        /* responsive */
        @media (max-width: 480px) {
            .btn-begin {
                font-size: 1.4rem;
                padding: 1rem 2.5rem;
            }
            .nu-btn {
                font-size: 1.4rem;
                padding: 0.8rem 1.8rem;
            }
            .message-card {
                padding: 1.5rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div id="app">

        <!-- OPENING SCENE -->
        <div id="opening" class="scene active">
            <div class="floating-hearts" id="heartsContainer"></div>
            <div class="title-large">🌸 Happy 18th Birthday Baby ❤️</div>
            <div class="sub-glow">✨ A story made just for you ✨</div>
            <button class="btn-begin" id="beginBtn">✨ Begin Surprise ✨</button>
        </div>

        <!-- NU SCENE -->
        <div id="nu-scene" class="scene">
            <div class="nu-container">
                <div class="nu-title">🎉 Do you want to see your birthday cake and your message? 💌</div>
                <button class="nu-btn" id="nuBtn">Nu 😝</button>
                <button class="nu-btn yes" id="yesBtn" style="display:none;">💖 Yes I would love to! 💖</button>
                <div style="color:#b8a0b8; font-size:0.9rem; margin-top:1rem;">(try clicking the "Nu" button 😂)</div>
            </div>
        </div>

        <!-- MESSAGE SCENE (second page) -->
        <div id="message-scene" class="scene">
            <div class="message-card">
                <div class="message-text" id="messageContent">
                    <!-- Your personalized message will appear here -->
                </div>
            </div>
            <button class="btn-begin" style="font-size:1.2rem; padding:0.8rem 2.5rem; margin-top:1rem;" onclick="triggerCelebration()">🎆 Let's Celebrate! 🎆</button>
        </div>

        <!-- celebration overlay (invisible until triggered) -->
        <div class="celebration-overlay" id="celebrationOverlay" style="display:none;"></div>
    </div>

    <script>
        // ============================================================
        //  💖 YOUR PERSONALIZED BIRTHDAY MESSAGE FOR GOH PEI SHUEN 💖
        // ============================================================
        const MY_MESSAGE = `
            <h1>🎂 Happy 18th Birthday my sweet little baby girl! ❤️</h1>

            <p>🎉 It's your 18th birthday hehehehe yey ❤️ I'm so happy for you my love ❤️ you are 18 years old now my love ❤️ its your first year going into adult hood now baby ❤️ :3 (hope you pass all your driving lessons and test in one go by the way HEHEHEHEHEHE)</p>

            <p>💕 I just want to say that I love you so much Goh Pei Shuen ❤️ and that my love for you will always be here ❤️, I want you to know that no matter what happens I will always be here by your side and I'm not going anywhere my love ❤️</p>

            <p>💗 I know things have been tough for us my love ❤️ and I understand how hard it is for the both of us right now when we don't see eye to eye baby ❤️ because I can see that you overthink alot about our relationship stuff and feelings stuff but I do want to reassure you one thing, is that I'll always do my best to do better and treat you better baby ❤️ don't ever forget that my love ❤️ I just want to reassure you that I love you very much babe ❤️ and that I will always be here for you my love ❤️</p>

            <p>🌸 Mostly I just want to say that today is a very special day for you and i hope you will enjoy your birthday to it's fullest. I want you to have great health and always take good care of yourself my love ❤️, I want to grow old together with you and be able to spend lots and lots of time with you, all the happy and unhappy moments, I can't wait to celebrate your birthday with you my love ❤️ hehehehehe</p>

            <p>🎈 I know our date for celebrating your birthday would be fun and memorable for the both of us if you can celebrate it with me on the day itself my love ❤️ hehehehehehehe I just want to make you feel as special as I possibly can for today my love ❤️ hehehehehehehe and that's why I created this website for you my love ❤️</p>

            <p>💻 I hope you like it baby ❤️ because it took me a month to code this out my love ❤️ hehehehehe I hope to share all the surprises and gifts with you when I can baby ❤️ :3 although I'm not sure by the time I sent this to you we will have celebrated your birthday earlier or later, but still I hope you will love it baby ❤️ :3.</p>

            <p>🧁 Once again happy birthday my mini little cupcake ❤️ hehehehe, I love you so much baby ❤️ let's enjoy our date together when we celebrate your birthday my love ❤️ :3 and also have a great day because I will most likely be sending this at 12am on the dot MUEHEHEHEHEHEHEHEHEHEHEHEHEHE</p>

            <p>📚 Another thing that I know you are worried about right now is your exam my love ❤️ I know you can do it my love ❤️ I understand you are sad about needing to resit but I believe you can do it baby ❤️ the exam paper you already know the structure and everything so I believe you can pass when you resit, I have all my faith in you that you can do it baby ❤️ :3 give it your all for your exam my love ❤️ I know you can do it my love ❤️ good luck resitting for your exam baby ❤️ :3 mi believe in you and your hardworking for revision and study my love ❤️:3 hehehehehehe</p>

            <p style="font-size:1.3rem; text-align:center; margin-top:1.5rem;">
                <span class="heart-emoji">❤️</span> I love you so much baby <span class="heart-emoji">❤️</span><br>
                My love ❤️ Goh Pei Shuen ❤️ my one and only little grumpysauraus ❤️ and my little cutie patootie muffin ❤️
            </p>

            <p style="text-align:center; margin-top:1rem;">🎉🎊✨🌸💕🌹🎂🎈🎁💖</p>
        `;

        // ============================================================
        //  SCRIPT LOGIC
        // ============================================================

        // DOM refs
        const openingScene = document.getElementById('opening');
        const nuScene = document.getElementById('nu-scene');
        const messageScene = document.getElementById('message-scene');
        const beginBtn = document.getElementById('beginBtn');
        const nuBtn = document.getElementById('nuBtn');
        const yesBtn = document.getElementById('yesBtn');
        const messageContent = document.getElementById('messageContent');
        const celebrationOverlay = document.getElementById('celebrationOverlay');

        // floating hearts & sparkles (opening)
        (function initHearts() {
            const container = document.getElementById('heartsContainer');
            const emojis = ['❤️', '🌸', '✨', '💕', '🌹', '🎉', '💖'];
            for (let i = 0; i < 30; i++) {
                const h = document.createElement('div');
                h.className = 'heart-float';
                h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                h.style.left = Math.random() * 100 + '%';
                h.style.fontSize = (1.5 + Math.random() * 2.5) + 'rem';
                h.style.animationDuration = (8 + Math.random() * 14) + 's';
                h.style.animationDelay = (Math.random() * 12) + 's';
                container.appendChild(h);
            }
            for (let i = 0; i < 25; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.style.left = Math.random() * 100 + '%';
                s.style.top = Math.random() * 100 + '%';
                s.style.animationDelay = (Math.random() * 4) + 's';
                const size = 4 + Math.random() * 8;
                s.style.width = size + 'px';
                s.style.height = size + 'px';
                container.appendChild(s);
            }
        })();

        // scene navigation
        function goToScene(id) {
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        beginBtn.addEventListener('click', () => {
            goToScene('nu-scene');
            initNuButton();
        });

        // NU BUTTON MAGIC
        let nuInterval = null;
        const nuPhrases = [
            'Nu 😝', 'Nope 😂', 'Nice try 😏',
            'You really thought? 🤣', 'Impossible 😎',
            'Try again ❤️', 'Haha no 😘', 'Almost 😜',
            'Not today! 🌸', 'Keep trying! 💕'
        ];

        function initNuButton() {
            if (nuInterval) clearInterval(nuInterval);
            nuBtn.style.display = 'inline-block';
            yesBtn.style.display = 'none';
            nuBtn.textContent = 'Nu 😝';
            nuBtn.style.position = 'relative';
            nuBtn.style.left = '0px';
            nuBtn.style.top = '0px';
            nuBtn.style.transform = 'scale(1) rotate(0deg)';

            nuInterval = setInterval(() => {
                if (nuBtn.style.display === 'none') return;
                const rect = nuBtn.getBoundingClientRect();
                const maxX = window.innerWidth - rect.width - 20;
                const maxY = window.innerHeight - rect.height - 20;
                const x = Math.random() * maxX;
                const y = Math.random() * maxY;
                nuBtn.style.position = 'fixed';
                nuBtn.style.left = x + 'px';
                nuBtn.style.top = y + 'px';
                const scale = 0.6 + Math.random() * 0.8;
                const rotate = (Math.random() - 0.5) * 40;
                nuBtn.style.transform = `scale(${scale}) rotate(${rotate}deg)`;
                nuBtn.textContent = nuPhrases[Math.floor(Math.random() * nuPhrases.length)];
                if (Math.random() > 0.7) {
                    nuBtn.style.boxShadow = '0 0 60px #ff4d6d, 0 0 120px #ffb3c6';
                    setTimeout(() => {
                        nuBtn.style.boxShadow = '0 0 30px #ff4d6d';
                    }, 300);
                }
            }, 700);

            nuBtn.addEventListener('mouseover', function(e) {
                e.preventDefault();
                const rect = nuBtn.getBoundingClientRect();
                const maxX = window.innerWidth - rect.width - 20;
                const maxY = window.innerHeight - rect.height - 20;
                nuBtn.style.left = Math.random() * maxX + 'px';
                nuBtn.style.top = Math.random() * maxY + 'px';
                nuBtn.textContent = nuPhrases[Math.floor(Math.random() * nuPhrases.length)];
            });

            nuBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                const rect = nuBtn.getBoundingClientRect();
                const maxX = window.innerWidth - rect.width - 20;
                const maxY = window.innerHeight - rect.height - 20;
                nuBtn.style.left = Math.random() * maxX + 'px';
                nuBtn.style.top = Math.random() * maxY + 'px';
                nuBtn.textContent = nuPhrases[Math.floor(Math.random() * nuPhrases.length)];
            });

            yesBtn.addEventListener('click', function() {
                if (nuInterval) clearInterval(nuInterval);
                goToScene('message-scene');
                messageContent.innerHTML = MY_MESSAGE;
                triggerCelebration();
            });

            setTimeout(() => {
                if (nuBtn.style.display !== 'none') {
                    yesBtn.style.display = 'inline-block';
                    nuBtn.style.position = 'fixed';
                    nuBtn.style.left = '10%';
                    nuBtn.style.top = '80%';
                    nuBtn.textContent = 'Nu 😝';
                }
            }, 5000);
        }

        // CELEBRATION EFFECTS
        function triggerCelebration() {
            const overlay = celebrationOverlay;
            overlay.style.display = 'block';
            overlay.innerHTML = '';

            const colors = ['#ff4d6d', '#ffb3c6', '#ffd700', '#ff6b9d', '#ffaa77', '#ff77aa', '#ffffff', '#2ecc71', '#3498db'];
            for (let i = 0; i < 120; i++) {
                const c = document.createElement('div');
                c.className = 'confetti-piece';
                c.style.left = Math.random() * 100 + '%';
                c.style.top = '-10%';
                c.style.background = colors[Math.floor(Math.random() * colors.length)];
                c.style.width = (6 + Math.random() * 14) + 'px';
                c.style.height = (6 + Math.random() * 14) + 'px';
                c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                c.style.animationDuration = (2 + Math.random() * 4) + 's';
                c.style.animationDelay = (Math.random() * 3) + 's';
                overlay.appendChild(c);
            }

            for (let burst = 0; burst < 30; burst++) {
                setTimeout(() => {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * window.innerHeight * 0.7;
                    const fColors = ['#ff4d6d', '#ffb3c6', '#ffd700', '#ff6b9d', '#ffaa77', '#ff77aa', '#ffffff', '#2ecc71',
                        '#e74c3c', '#f1c40f'
                    ];
                    for (let i = 0; i < 30; i++) {
                        const p = document.createElement('div');
                        p.className = 'firework-particle';
                        const angle = Math.random() * 2 * Math.PI;
                        const dist = 80 + Math.random() * 200;
                        p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                        p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                        p.style.left = x + 'px';
                        p.style.top = y + 'px';
                        p.style.width = (4 + Math.random() * 12) + 'px';
                        p.style.height = p.style.width;
                        p.style.background = fColors[Math.floor(Math.random() * fColors.length)];
                        p.style.boxShadow = `0 0 30px ${p.style.background}`;
                        p.style.animationDuration = (0.8 + Math.random() * 0.8) + 's';
                        overlay.appendChild(p);
                        setTimeout(() => p.remove(), 1500);
                    }
                }, burst * 120);
            }

            setTimeout(() => {
                for (let i = 0; i < 40; i++) {
                    const heart = document.createElement('div');
                    heart.textContent = ['❤️', '💕', '🌸', '✨', '🎉', '💖', '🌹'][Math.floor(Math.random() * 7)];
                    heart.style.position = 'absolute';
                    heart.style.fontSize = (1.8 + Math.random() * 2.5) + 'rem';
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.top = '-10%';
                    heart.style.animation = `floatUp ${3 + Math.random() * 5}s linear forwards`;
                    heart.style.opacity = '0.8';
                    heart.style.pointerEvents = 'none';
                    overlay.appendChild(heart);
                    setTimeout(() => heart.remove(), 6000);
                }
            }, 1500);

            setTimeout(() => {
                overlay.style.display = 'none';
                overlay.innerHTML = '';
            }, 14000);
        }

        document.addEventListener('click', function(e) {
            if (e.target === nuBtn && yesBtn.style.display === 'inline-block') {
                const rect = nuBtn.getBoundingClientRect();
                const maxX = window.innerWidth - rect.width - 20;
                const maxY = window.innerHeight - rect.height - 20;
                nuBtn.style.left = Math.random() * maxX + 'px';
                nuBtn.style.top = Math.random() * maxY + 'px';
                nuBtn.textContent = nuPhrases[Math.floor(Math.random() * nuPhrases.length)];
            }
        });

        console.log('🎂 Happy 18th Birthday Goh Pei Shuen! ❤️');
        console.log('💖 Made with love for my little grumpysauraus 💖');
    </script>
</body>
</html>
